<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sơ đồ quản lý thư viện</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <h1 align="center">Sơ đồ quản lý thư viện</h1>

    <center>
        <button>Đăng nhập / Quét thẻ thư viện</button>
    </center>

    <table width="100%" border="0" cellpadding="20">
        <tr>

            <!-- Quản trị viên -->
            <td align="center">

                <h2>Quản trị viên</h2>

                <button>Đăng nhập</button>

                <table cellpadding="10">
                    <tr>
                        <td>
                            <button>Thêm bạn đọc</button><br><br>
                            <button>Sách/Tài liệu</button><br><br>
                            <button>Khoản phạt</button><br><br>
                            <button>Biên bản mượn/trả sách</button>
                        </td>

                        <td>
                            <button>Thêm sách</button><br><br>
                            <button>Thêm vị trí lưu trữ</button><br><br>
                            <button>Thêm bạn đọc</button><br><br>
                            <button>Gia hạn</button>
                        </td>
                    </tr>
                </table>

            </td>

            <!-- Bạn đọc -->
            <td align="center">

                <h2>Bạn đọc</h2>

                <button>Đăng nhập</button>

                <table cellpadding="10">
                    <tr>
                        <td>
                            <button>Tìm sách</button><br><br>
                            <button>Biên bản mượn sách</button><br><br>
                            <button>Biên bản nộp phạt</button>
                        </td>

                        <td>
                            <button>Tài khoản của tôi</button><br><br>
                            <button>Đổi mật khẩu</button><br><br>
                            <button>Khiếu nại</button>
                        </td>
                    </tr>
                </table>

            </td>

        </tr>
    </table>

    <center>
        <button>Đăng xuất</button>
    </center>

    <hr>

</body>
</html>
