<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sách</title>
    <link rel="stylesheet" href="../css/style18.css">

</head>
<body>
    <h1>Chi tiết sách</h1>
    <div class="container">
        <div class="top">
            <a href="#" class="back">← Về danh sách</a>
            <div class="content">
                <div class="image">
                    <img src="images/web.jpg" alt="Sách">
            </div>
            <div class="info">
                <h2>Mô tả</h2>
                <p><b>Tên sách:</b> Lập trình Web</p>
                <p><b>Tác giả:</b> Nguyễn Văn A</p>
                <p><b>Thể loại:</b> Công nghệ thông tin</p>
                <p><b>Nhà xuất bản:</b> Giáo dục</p>
                <p><b>Năm xuất bản:</b> 2024</p>
                <p><b>Số lượng:</b> 10</p>
                p><b>Tình trạng:</b> Còn sách</p>
                <div class="btn">
                    <button>Mượn sách</button>
                </div>
                </div>
            </div>
        </div>
        <div class="item">
            <span>📄 Nội dung</span>
            <span>▼</span>
        </div>
        <div class="item">
            <span>💬 Nhận xét</span>
            <span>▼</span>
        </div>
        <div class="item">
            <span>🕒 Lịch sử mượn</span>
            <span>▼</span>
        </div>
    </div>
</body>
</html>
