<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang tìm kiếm</title>
    <link rel="stylesheet" href="../css/style21.css">
</head>
<body>
    <h2>Tìm kiếm sách</h2>
    <div class="container">

        <div class="search">
            <input type="text" placeholder="Nhập tên sách...">
            <button>Tìm kiếm</button>
        </div>
        <div class="main">
            <div class="filter">
                <h3>Bộ lọc</h3>
                <select>
                    <option>Thể loại</option>
                    <option>Lập trình</option>
                    <option>Văn học</option>
                    <option>Tạp chí</option>
                    <option>Ngoại văn</option>
                </select>
                <select>
                    <option>Tác giả</option>
                </select>
                <select>
                    <option>Nhà xuất bản</option>
                </select>
                <button>Lọc</button>
            </div>
            <div class="result">
                <h3>Kết quả tìm kiếm</h3>
                <div class="book">
                    <div class="image">Ảnh bìa
                    </div>
                    <div class="info">
                        <p><b>Tên sách:</b> Lập trình Web</p>
                        <p><b>Tác giả:</b> Nguyễn Văn A</p>
                        <p><b>Thể loại:</b> Công nghệ thông tin</p>
                        <p><b>Nhà xuất bản:</b> Giáo dục</p>
                        <p><b>Tình trạng:</b> Còn sách</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
